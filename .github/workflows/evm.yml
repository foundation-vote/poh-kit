name: evm
on:
  push: { branches: [main], paths: ["contracts/evm/**", ".github/workflows/evm.yml"] }
  pull_request: { paths: ["contracts/evm/**"] }
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: contracts/evm } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npx hardhat compile
      - run: npx hardhat test
