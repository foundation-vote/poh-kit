name: ts
on:
  push: { branches: [main], paths: ["packages/**", "package.json", "vitest.config.ts", "tsconfig.base.json", ".github/workflows/ts.yml"] }
  pull_request: { paths: ["packages/**"] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm test
